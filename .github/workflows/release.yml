name: Release

# Push a tag like v0.2.0 and a release with the packaged .vsix appears.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npx --yes @vscode/vsce package
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
